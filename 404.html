<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — página no encontrada</title>
<link rel="icon" href="assets/img/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#11151c; --panel:#181d27; --panel-2:#1f2530; --line:#2b323f;
    --paper:#e8eaed; --muted:#8b93a1; --green:#3dd68c; --amber:#f2a93b; --red:#f2545b;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:var(--ink); color:var(--paper); font-family:'IBM Plex Mono', monospace; padding:20px;
  }
  .window{max-width:440px; width:100%; border:1px solid var(--line); border-radius:12px; overflow:hidden;}
  .winhead{display:flex; align-items:center; gap:10px; padding:10px 16px; background:var(--panel-2); font-size:12px; color:var(--muted);}
  .traffic{display:flex; gap:7px;}
  .traffic span{width:11px; height:11px; border-radius:50%; display:inline-block;}
  .traffic .r{background:var(--red);} .traffic .a{background:var(--amber);} .traffic .g{background:var(--green);}
  .body{background:var(--panel); padding:28px;}
  .code{font-family:'Space Grotesk', sans-serif; font-size:52px; font-weight:700; color:var(--red); margin:0 0 6px;}
  p{color:var(--muted); font-size:14px; margin:0 0 18px; line-height:1.6;}
  .ln{margin-bottom:4px;}
  .prompt{color:var(--green);}
  a.btn{
    display:inline-block; background:var(--green); color:var(--ink); text-decoration:none;
    font-weight:600; border-radius:8px; padding:10px 16px; font-size:13px;
  }
</style>
</head>
<body>
  <div class="window">
    <div class="winhead"><div class="traffic"><span class="r"></span><span class="a"></span><span class="g"></span></div> 404.log</div>
    <div class="body">
      <p class="ln"><span class="prompt">$</span> cd esa-página-que-buscabas</p>
      <p class="ln">bash: no existe ese archivo o directorio</p>
      <h1 class="code">404</h1>
      <p>La página que buscás no está (o se mudó). Volvé al inicio y probá de nuevo.</p>
      <a class="btn" href="index.html">← Volver al inicio</a>
    </div>
  </div>
</body>
</html>
